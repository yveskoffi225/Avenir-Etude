<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avenir Étude — Test RIASEC Complet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Instrument+Serif:ital@0;1&family=Instrument+Sans:ital,wght@0,400;0,500;0,600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        :root{
      --ink:#060B14;
      --ink-2:#0C1220;
      --ink-3:#111827;
      --ink-4:#1C2535;
      --gold:#D4A853;
      --gold-dim:#7A5E2A;
      --gold-10:rgba(212,168,83,.10);
      --gold-20:rgba(212,168,83,.20);
      --ivory:#F2EDE4;
      --ivory-dim:#8A8278;
      --ivory-faint:#2E3545;
      --wire:rgba(242,237,228,.07);
      --wire-mid:rgba(242,237,228,.13);
      --wire-hi:rgba(242,237,228,.24);
      --green:#34C97A;
      --green-10:rgba(52,201,122,.1);
      --blue:#4F7AE8;
      --blue-10:rgba(79,122,232,.1);
      --red:#E05A54;
      --red-10:rgba(224,90,84,.1);
      --orange:#F59E0B;
      --purple:#8B5CF6;
      --max-w:1200px;
      --nav-h:64px;
      --radius:12px;
    }
    body{font-family:'Instrument Sans',sans-serif;background:var(--ink);color:var(--ivory);-webkit-font-smoothing:antialiased;cursor:none;min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;}
    .cursor{position:fixed;width:8px;height:8px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;transition:width .18s,height .18s;}
    .cursor.big{width:28px;height:28px;background:transparent;border:1.5px solid var(--gold);}
    body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:8000;opacity:.5;}

    /* ── TOP BAR ── */
    .top-bar{
      height:56px;border-bottom:1px solid var(--wire);
      background:rgba(6,11,20,.97);backdrop-filter:blur(16px);
      display:flex;align-items:center;padding:0 32px;gap:20px;
      position:sticky;top:0;z-index:200;
      flex-shrink:0;
    }
    .tb-logo{font-family:'Bricolage Grotesque',sans-serif;font-size:15px;font-weight:700;color:var(--ivory);letter-spacing:-.03em;text-decoration:none;}
    .tb-progress-wrap{flex:1;display:flex;align-items:center;gap:12px;}
    .tb-progress-track{flex:1;height:3px;background:var(--wire);border-radius:2px;overflow:hidden;}
    .tb-progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .4s ease;}
    .tb-progress-pct{font-family:'Bricolage Grotesque',sans-serif;font-size:12px;font-weight:700;color:var(--gold);min-width:36px;text-align:right;}
    .tb-right{display:flex;align-items:center;gap:16px;}

    /* CHRONO */
    .chrono-wrap{display:flex;align-items:center;gap:8px;}
    .chrono-ring{position:relative;width:36px;height:36px;flex-shrink:0;}
    .chrono-ring svg{position:absolute;top:0;left:0;}
    .chrono-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Bricolage Grotesque',sans-serif;font-size:11px;font-weight:800;color:var(--ivory);}
    .chrono-label{font-size:11px;color:var(--ivory-dim);white-space:nowrap;}

    /* RIASEC dots */
    .riasec-dots{display:flex;gap:4px;}
    .rdot{width:8px;height:8px;border-radius:50%;background:var(--ink-4);transition:background .3s;}
    .rdot.R{background:#E05A54;} .rdot.I{background:#4F7AE8;} .rdot.A{background:#8B5CF6;}
    .rdot.S{background:#34C97A;} .rdot.E{background:#D4A853;} .rdot.C{background:#F59E0B;}

    /* ── MAIN AREA ── */
    .main{flex:1;display:flex;overflow:hidden;}

    /* SIDEBAR */
    .sidebar{
      width:64px;border-right:1px solid var(--wire);
      display:flex;flex-direction:column;align-items:center;
      padding:16px 8px;gap:4px;overflow-y:auto;scrollbar-width:none;flex-shrink:0;
    }
    .sidebar::-webkit-scrollbar{display:none;}
    .q-dot{
      width:28px;height:28px;border-radius:50%;border:1px solid var(--wire);
      display:flex;align-items:center;justify-content:center;
      font-size:9px;font-weight:700;color:var(--ivory-faint);
      cursor:none;transition:all .15s;flex-shrink:0;font-family:'Bricolage Grotesque',sans-serif;
    }
    .q-dot.answered{background:var(--gold);border-color:var(--gold);color:var(--ink);}
    .q-dot.current{border-color:var(--gold);color:var(--gold);}
    .q-dot.skipped{border-color:var(--red);color:var(--red);}

    /* QUESTION AREA */
    .q-area{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px;overflow-y:auto;}
    .q-card{width:100%;max-width:680px;}

    /* Category badge */
    .q-category{
      display:inline-flex;align-items:center;gap:8px;
      font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
      padding:4px 14px;border-radius:20px;margin-bottom:20px;
    }
    .cat-R{background:rgba(224,90,84,.12);color:#E05A54;border:1px solid rgba(224,90,84,.2);}
    .cat-I{background:rgba(79,122,232,.12);color:#4F7AE8;border:1px solid rgba(79,122,232,.2);}
    .cat-A{background:rgba(139,92,246,.12);color:#8B5CF6;border:1px solid rgba(139,92,246,.2);}
    .cat-S{background:rgba(52,201,122,.12);color:#34C97A;border:1px solid rgba(52,201,122,.2);}
    .cat-E{background:var(--gold-10);color:var(--gold);border:1px solid var(--gold-dim);}
    .cat-C{background:rgba(245,158,11,.12);color:#F59E0B;border:1px solid rgba(245,158,11,.2);}

    /* Question number & text */
    .q-num{font-size:11px;color:var(--ivory-dim);margin-bottom:10px;letter-spacing:.04em;}
    .q-text{
      font-family:'Bricolage Grotesque',sans-serif;
      font-size:clamp(20px,3vw,30px);font-weight:700;
      color:var(--ivory);letter-spacing:-.03em;line-height:1.25;
      margin-bottom:36px;
    }

    /* Options */
    .q-options{display:flex;flex-direction:column;gap:10px;}
    .q-option{
      display:flex;align-items:center;gap:16px;
      padding:16px 22px;border-radius:12px;
      border:1px solid var(--wire-mid);background:var(--ink-3);
      cursor:none;transition:all .2s;
    }
    .q-option:hover{border-color:var(--gold-dim);background:var(--gold-10);}
    .q-option.selected{border-color:var(--gold);background:var(--gold-10);}
    .q-option.selected .opt-key{background:var(--gold);color:var(--ink);}
    .opt-key{
      width:28px;height:28px;border-radius:6px;border:1px solid var(--wire-mid);
      display:flex;align-items:center;justify-content:center;
      font-family:'Bricolage Grotesque',sans-serif;font-size:11px;font-weight:700;
      color:var(--ivory-dim);transition:all .2s;flex-shrink:0;
    }
    .opt-text{font-size:14px;color:var(--ivory);line-height:1.5;}
    .opt-val{margin-left:auto;font-family:'Bricolage Grotesque',sans-serif;font-size:13px;font-weight:700;color:var(--ivory-faint);}
    .q-option.selected .opt-val{color:var(--gold);}

    /* Timer warning */
    .q-option.urgent{animation:shake .1s ease-in-out;}
    @keyframes shake{0%,100%{transform:translateX(0)}50%{transform:translateX(-2px)}}

    /* BOTTOM BAR */
    .bottom-bar{
      height:72px;border-top:1px solid var(--wire);
      background:rgba(6,11,20,.95);
      display:flex;align-items:center;justify-content:space-between;
      padding:0 32px;flex-shrink:0;gap:20px;
    }
    .bb-left{display:flex;align-items:center;gap:12px;}
    .bb-info{font-size:12px;color:var(--ivory-dim);}
    .bb-info strong{color:var(--ivory);font-weight:600;}
    .btn-skip{font-size:12px;font-weight:600;color:var(--ivory-dim);background:none;border:1px solid var(--wire-mid);border-radius:8px;padding:8px 16px;cursor:none;transition:all .15s;font-family:'Instrument Sans',sans-serif;}
    .btn-skip:hover{border-color:var(--red);color:var(--red);}
    .btn-next{
      font-family:'Bricolage Grotesque',sans-serif;font-size:14px;font-weight:700;
      padding:12px 28px;background:var(--gold);color:var(--ink);
      border:none;border-radius:10px;cursor:none;transition:all .15s;
      display:flex;align-items:center;gap:8px;
    }
    .btn-next:hover{background:#e0b55e;transform:translateY(-1px);}
    .btn-next:disabled{opacity:.4;transform:none;cursor:none;}

    /* SCORE PANEL (hidden until done) */
    .score-panel{
      display:none;flex-direction:column;align-items:center;justify-content:center;
      padding:40px;text-align:center;width:100%;
    }
    .score-panel.show{display:flex;}
    .sp-title{font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(28px,4vw,48px);font-weight:800;color:var(--ivory);letter-spacing:-.04em;margin-bottom:8px;}
    .sp-title em{font-family:'Instrument Serif',serif;font-style:italic;color:var(--gold);}
    .sp-sub{font-size:14px;color:var(--ivory-dim);margin-bottom:40px;line-height:1.7;}
    .sp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:600px;margin-bottom:32px;}
    .sp-card{background:var(--ink-3);border:1px solid var(--wire);border-radius:12px;padding:18px;}
    .sp-card-val{font-family:'Bricolage Grotesque',sans-serif;font-size:28px;font-weight:800;letter-spacing:-.03em;}
    .sp-card-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--ivory-dim);margin-top:4px;}
    .sp-profile{display:flex;gap:12px;margin-bottom:32px;flex-wrap:wrap;justify-content:center;}
    .sp-badge{
      padding:10px 20px;border-radius:10px;
      font-family:'Bricolage Grotesque',sans-serif;font-size:16px;font-weight:800;
    }
    .btn-results{
      font-family:'Bricolage Grotesque',sans-serif;font-size:16px;font-weight:700;
      padding:16px 40px;background:var(--gold);color:var(--ink);
      border:none;border-radius:12px;cursor:none;transition:all .2s;
      display:inline-flex;align-items:center;gap:10px;
    }
    .btn-results:hover{background:#e0b55e;transform:translateY(-2px);box-shadow:0 8px 24px rgba(212,168,83,.3);}

    /* KEYBOARD HINT */
    .kb-hint{font-size:11px;color:var(--ivory-faint);text-align:center;margin-top:20px;}

    /* RESPONSIVE */
    @media(max-width:768px){
      .sidebar{display:none;}
      .q-area{padding:24px 20px;}
      .bottom-bar{padding:0 20px;}
      .top-bar{padding:0 20px;}
    }
      .tb-back{font-size:11px;font-weight:600;color:var(--ivory-dim);text-decoration:none;padding:5px 12px;border:1px solid var(--wire-mid);border-radius:6px;flex-shrink:0;}
    .tb-back:hover{border-color:var(--wire-hi);color:var(--ivory);}
  </style>
</head>
<body>
<div class="cursor" id="cur"></div>

<!-- TOP BAR -->
<div class="top-bar">
  <a href="avenir_etude_homepage_v2.html" class="tb-logo" style="font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:15px;letter-spacing:-.03em;">Avenir <span style="font-style:italic;color:var(--gold);">Étude</span></a>
  <a href="avenir_etude_tests.html" class="tb-back">← Portail tests</a>
    <div id="tb-user" style="font-size:11px;color:var(--ivory-dim);display:flex;align-items:center;gap:8px;">
      <span id="tb-metier" style="color:var(--gold);font-weight:600;"></span>
    </div>
  <div class="tb-progress-wrap">
    <div class="tb-progress-track">
      <div class="tb-progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="tb-progress-pct" id="progress-pct">0%</div>
  </div>
  <div class="tb-right">
    <!-- Chrono -->
    <div class="chrono-wrap">
      <div class="chrono-ring">
        <svg width="36" height="36" viewBox="0 0 36 36">
          <circle cx="18" cy="18" r="14" fill="none" stroke="rgba(242,237,228,.08)" stroke-width="2.5"/>
          <circle cx="18" cy="18" r="14" fill="none" stroke="#D4A853" stroke-width="2.5"
            stroke-dasharray="88" stroke-dashoffset="0" stroke-linecap="round"
            transform="rotate(-90 18 18)" id="chrono-ring" style="transition:stroke-dashoffset .1s linear,stroke .3s;"/>
        </svg>
        <div class="chrono-num" id="chrono-num">8</div>
      </div>
      <div class="chrono-label">sec / question</div>
    </div>
    <!-- RIASEC live dots -->
    <div class="riasec-dots" id="riasec-dots">
      <div class="rdot" id="dot-R" title="Réaliste"></div>
      <div class="rdot" id="dot-I" title="Investigatif"></div>
      <div class="rdot" id="dot-A" title="Artistique"></div>
      <div class="rdot" id="dot-S" title="Social"></div>
      <div class="rdot" id="dot-E" title="Entreprenant"></div>
      <div class="rdot" id="dot-C" title="Conventionnel"></div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- Sidebar dots -->
  <div class="sidebar" id="sidebar"></div>

  <!-- Question area -->
  <div class="q-area" id="q-area">
    <div class="q-card" id="q-card">
      <!-- Question injected by JS -->
    </div>
    <div class="kb-hint" id="kb-hint">Clavier : <strong>1</strong> Pas du tout · <strong>2</strong> Un peu · <strong>3</strong> Assez · <strong>4</strong> Beaucoup · <strong>5</strong> Passionné · <strong>→</strong> Suivante</div>
  </div>

  <!-- Score panel -->
  <div class="score-panel" id="score-panel">
    <div class="sp-title">Test complété !<br>Votre profil <em id="sp-code">—</em></div>
    <div id="sp-name" style="font-size:14px;color:var(--ivory-dim);margin-bottom:8px;"></div>
    <p class="sp-sub" id="sp-sub">Voici vos scores sur les 6 dimensions RIASEC</p>
    <div class="sp-grid" id="sp-grid"></div>
    <div class="sp-profile" id="sp-profile"></div>
    <button class="btn-results" onclick="document.body.style.opacity='0';document.body.style.transition='opacity .4s';setTimeout(()=>window.location.href='avenir_etude_dashboard_resultats.html',400)" >
      Voir mon rapport complet →
    </button>
  </div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar" id="bottom-bar">
  <div class="bb-left">
    <div class="bb-info">Question <strong id="q-num-label">1</strong> sur <strong>100</strong></div>
    <button class="btn-skip" onclick="skipQuestion()">Passer →</button>
  </div>
  <button class="btn-next" id="btn-next" onclick="nextQuestion()" disabled>
    Suivant
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </button>
</div>

<script>
/* CURSOR */
const cur=document.getElementById('cur');
let mx=0,my=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
document.querySelectorAll('button,a,.q-option').forEach(el=>{el.addEventListener('mouseenter',()=>cur.classList.add('big'));el.addEventListener('mouseleave',()=>cur.classList.remove('big'));});

/* ══════════════════════════════════════════════════════
   100 QUESTIONS RIASEC — Contextualisées Afrique CI
   6 dimensions × ~17 questions chacune
   Échelle : 1=Pas du tout  2=Un peu  3=Assez  4=Beaucoup  5=Passionné
══════════════════════════════════════════════════════ */
const QUESTIONS = [
  // ── RÉALISTE (R) — 17 questions ──────────────────────────
  {id:1,  cat:'R', text:"J'aime réparer des appareils électroniques, des machines ou des objets cassés."},
  {id:2,  cat:'R', text:"Travailler sur un chantier de construction m'attire."},
  {id:3,  cat:'R', text:"J'aime utiliser des outils, des machines ou de l'équipement technique."},
  {id:4,  cat:'R', text:"Je préfère les activités qui produisent un résultat concret et visible."},
  {id:5,  cat:'R', text:"Conduire et entretenir des véhicules ou des engins m'intéresse."},
  {id:6,  cat:'R', text:"Je serais à l'aise dans un atelier ou un laboratoire technique."},
  {id:7,  cat:'R', text:"Les métiers de l'agriculture, de l'élevage ou de la pêche m'attirent."},
  {id:8,  cat:'R', text:"Je suis à l'aise avec les travaux manuels de précision."},
  {id:9,  cat:'R', text:"Construire ou fabriquer quelque chose avec mes mains me satisfait profondément."},
  {id:10, cat:'R', text:"Je préfère agir concrètement plutôt que de réfléchir longuement en théorie."},
  {id:11, cat:'R', text:"Les métiers du BTP (Bâtiment et Travaux Publics) me semblent valorisants."},
  {id:12, cat:'R', text:"Je serais à l'aise en tant qu'électricien, plombier ou mécanicien qualifié."},
  {id:13, cat:'R', text:"Je trouve plaisir à jardiner, cultiver ou travailler la terre."},
  {id:14, cat:'R', text:"Travailler dans la nature, en plein air, me convient mieux qu'un bureau."},
  {id:15, cat:'R', text:"Je préfère un travail où je suis debout et actif plutôt qu'assis."},
  {id:16, cat:'R', text:"Assembler des pièces mécaniques ou électroniques me fascine."},
  {id:17, cat:'R', text:"Je m'intéresse aux énergies renouvelables et aux techniques d'installation."},

  // ── INVESTIGATIF (I) — 17 questions ──────────────────────
  {id:18, cat:'I', text:"Résoudre des problèmes de mathématiques complexes me donne de la satisfaction."},
  {id:19, cat:'I', text:"Je passe du temps à chercher des explications sur des phénomènes naturels."},
  {id:20, cat:'I', text:"Lire des articles scientifiques ou des livres de connaissance m'intéresse."},
  {id:21, cat:'I', text:"J'aime analyser des données, des statistiques ou des graphiques."},
  {id:22, cat:'I', text:"La biologie, la chimie ou la physique sont des matières qui me passionnent."},
  {id:23, cat:'I', text:"J'ai tendance à chercher des causes profondes plutôt que d'accepter les apparences."},
  {id:24, cat:'I', text:"Mener des expériences ou des recherches m'attire fortement."},
  {id:25, cat:'I', text:"Les technologies comme l'Intelligence Artificielle ou la data me fascinent."},
  {id:26, cat:'I', text:"Je serais à l'aise dans un laboratoire de recherche ou un centre de données."},
  {id:27, cat:'I', text:"Décoder des algorithmes ou des problèmes logiques est une activité que j'apprécie."},
  {id:28, cat:'I', text:"Je me pose souvent des questions sur le fonctionnement du monde qui m'entoure."},
  {id:29, cat:'I', text:"Analyser une situation avant d'agir est mon approche naturelle."},
  {id:30, cat:'I', text:"Les métiers comme médecin, ingénieur, data scientist ou chercheur m'attirent."},
  {id:31, cat:'I', text:"Je peux passer des heures à comprendre un concept complexe sans me lasser."},
  {id:32, cat:'I', text:"Résoudre des problèmes nouveaux me stimule davantage que les tâches répétitives."},
  {id:33, cat:'I', text:"J'aime trouver des solutions originales et inattendues à des problèmes."},
  {id:34, cat:'I', text:"Je préfère travailler seul sur un problème difficile plutôt qu'en groupe."},

  // ── ARTISTIQUE (A) — 17 questions ─────────────────────────
  {id:35, cat:'A', text:"La création artistique — musique, dessin, écriture, danse — occupe une place importante dans ma vie."},
  {id:36, cat:'A', text:"Je préfère les situations où je peux m'exprimer librement plutôt que suivre des règles strictes."},
  {id:37, cat:'A', text:"J'ai un fort sens de l'esthétique — les couleurs, les formes et les styles m'importent."},
  {id:38, cat:'A', text:"Écrire des textes créatifs, des histoires ou de la poésie me plaît."},
  {id:39, cat:'A', text:"Les métiers comme graphiste, architecte, designer ou réalisateur m'attirent."},
  {id:40, cat:'A', text:"Je ressens le besoin d'exprimer mes émotions à travers une forme d'art."},
  {id:41, cat:'A', text:"Imaginer et concevoir des univers, des personnages ou des histoires me vient naturellement."},
  {id:42, cat:'A', text:"Je trouve que l'art et la culture africaine ont une valeur inestimable."},
  {id:43, cat:'A', text:"Photographier, filmer ou créer du contenu visuel m'enthousiasme."},
  {id:44, cat:'A', text:"Je peux rester des heures à perfectionner un dessin, une mélodie ou un texte."},
  {id:45, cat:'A', text:"Les environnements créatifs et peu conventionnels me conviennent mieux."},
  {id:46, cat:'A', text:"Je pense que la beauté et l'originalité sont des critères importants dans mon travail."},
  {id:47, cat:'A', text:"Créer quelque chose de nouveau qui n'a jamais existé avant me motive profondément."},
  {id:48, cat:'A', text:"La mode, le stylisme ou le design intérieur sont des domaines qui m'attirent."},
  {id:49, cat:'A', text:"J'apprécie les métiers qui mêlent créativité et technologie — UX, jeu vidéo, animation."},
  {id:50, cat:'A', text:"Je suis sensible à l'atmosphère des espaces et j'aime les décorer ou les transformer."},
  {id:51, cat:'A', text:"Les arts de la scène — théâtre, comédie, cinéma — m'ont toujours fasciné."},

  // ── SOCIAL (S) — 17 questions ──────────────────────────────

  {id:86,  cat:'C', text:"J'aime les tâches organisées, claires et bien définies."},

const OPTIONS = [
  {val:1, label:"Pas du tout"},
  {val:2, label:"Un peu"},
  {val:3, label:"Assez"},
  {val:4, label:"Beaucoup"},
  {val:5, label:"Passionné(e)"},
];

/* STATE */
let current = 0;
let answers = new Array(100).fill(null);
let scores = {R:0,I:0,A:0,S:0,E:0,C:0};
let chronoInterval = null;
let chronoLeft = 8;
const CHRONO_TOTAL = 8;
const CIRCUM = 2 * Math.PI * 14; // r=14 → ~87.96

/* BUILD SIDEBAR */
function buildSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = QUESTIONS.map((q,i) =>
    `<div class="q-dot" id="qdot-${i}" onclick="goTo(${i})">${i+1}</div>`
  ).join('');
}

/* RENDER QUESTION */
function renderQ() {
  const q = QUESTIONS[current];
  const card = document.getElementById('q-card');

  const catNames = {R:'Réaliste',I:'Investigatif',A:'Artistique',S:'Social',E:'Entreprenant',C:'Conventionnel'};
  const selectedVal = answers[current];

  card.innerHTML = `
    <div class="q-category cat-${q.cat}">${catNames[q.cat]}</div>
    <div class="q-num">Question ${current+1} sur 100</div>
    <div class="q-text">${q.text}</div>
    <div class="q-options">
      ${OPTIONS.map(o => `
        <div class="q-option ${selectedVal===o.val?'selected':''}" onclick="selectOption(${o.val})" data-val="${o.val}">
          <div class="opt-key">${o.val}</div>
          <div class="opt-text">${o.label}</div>
          <div class="opt-val">${o.val}/5</div>
        </div>`).join('')}
    </div>`;

  // Update UI
  document.getElementById('q-num-label').textContent = current + 1;
  document.getElementById('btn-next').disabled = selectedVal === null;

  // Update progress
  const answered = answers.filter(a=>a!==null).length;
  const pct = Math.round(answered / 100 * 100);
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';

  // Update sidebar dots
  QUESTIONS.forEach((_,i) => {
    const dot = document.getElementById('qdot-'+i);
    dot.className = 'q-dot';
    if (i === current) dot.classList.add('current');
    else if (answers[i] !== null) dot.classList.add('answered');
    else if (i < current && answers[i] === null) dot.classList.add('skipped');
  });

  // Scroll sidebar dot into view
  const activeDot = document.getElementById('qdot-'+current);
  if (activeDot) activeDot.scrollIntoView({block:'nearest',behavior:'smooth'});

  // Update RIASEC dots intensity
  updateRiasecDots();

  // Reset + start chrono
  startChrono();

  // Add hover to new options
  document.querySelectorAll('.q-option').forEach(el=>{
    el.addEventListener('mouseenter',()=>cur.classList.add('big'));
    el.addEventListener('mouseleave',()=>cur.classList.remove('big'));
  });
}

/* RIASEC DOTS */
function updateRiasecDots() {
  const cats = ['R','I','A','S','E','C'];
  const maxScore = Math.max(...cats.map(c => scores[c])) || 1;
  cats.forEach(c => {
    const dot = document.getElementById('dot-'+c);
    const ratio = scores[c] / maxScore;
    dot.style.opacity = 0.3 + ratio * 0.7;
    if (ratio > 0.5) dot.classList.add(c);
  });
}

/* SELECT OPTION */
function selectOption(val) {
  answers[current] = val;
  scores[QUESTIONS[current].cat] += val;
  document.querySelectorAll('.q-option').forEach(o => {
    o.classList.toggle('selected', parseInt(o.dataset.val) === val);
  });
  document.getElementById('btn-next').disabled = false;
  // Auto-advance after 600ms
  clearInterval(chronoInterval);
  setTimeout(() => {
    if (answers[current] !== null) nextQuestion();
  }, 600);
}

/* CHRONO */
function startChrono() {
  clearInterval(chronoInterval);
  chronoLeft = CHRONO_TOTAL;
  updateChronoUI();
  chronoInterval = setInterval(() => {
    chronoLeft--;
    updateChronoUI();
    if (chronoLeft <= 0) {
      clearInterval(chronoInterval);
      // Auto skip
      skipQuestion(true);
    }
  }, 1000);
}

function updateChronoUI() {
  const ring = document.getElementById('chrono-ring');
  const num = document.getElementById('chrono-num');
  const ratio = chronoLeft / CHRONO_TOTAL;
  const offset = CIRCUM * (1 - ratio);
  ring.setAttribute('stroke-dashoffset', offset);
  num.textContent = Math.max(0, chronoLeft);
  // Color shift
  if (chronoLeft <= 3) {
    ring.setAttribute('stroke', '#E05A54');
    num.style.color = '#E05A54';
  } else if (chronoLeft <= 5) {
    ring.setAttribute('stroke', '#F59E0B');
    num.style.color = '#F59E0B';
  } else {
    ring.setAttribute('stroke', '#D4A853');
    num.style.color = '';
  }
}

/* NAVIGATION */
function nextQuestion() {
  clearInterval(chronoInterval);
  if (current < 99) {
    current++;
    renderQ();
  } else {
    showResults();
  }
}

function skipQuestion(auto=false) {
  clearInterval(chronoInterval);
  if (current < 99) {
    current++;
    renderQ();
  } else {
    showResults();
  }
}

function goTo(idx) {
  clearInterval(chronoInterval);
  current = idx;
  renderQ();
}

/* KEYBOARD */
document.addEventListener('keydown', e => {
  if (['1','2','3','4','5'].includes(e.key)) {
    selectOption(parseInt(e.key));
  } else if (e.key === 'ArrowRight' || e.key === 'Enter') {
    if (answers[current] !== null) nextQuestion();
  } else if (e.key === 'ArrowLeft') {
    if (current > 0) { current--; renderQ(); }
  }
});

/* RESULTS */
function showResults() {
  clearInterval(chronoInterval);
  document.getElementById('q-card').style.display = 'none';
  document.getElementById('kb-hint').style.display = 'none';
  document.getElementById('bottom-bar').style.display = 'none';
  document.getElementById('sidebar').style.display = 'none';

  const panel = document.getElementById('score-panel');
  panel.classList.add('show');

  // Compute percentages
  const maxPossible = 17 * 5; // 17 questions × max 5
  const cats = ['R','I','A','S','E','C'];
  const names = {R:'Réaliste',I:'Investigatif',A:'Artistique',S:'Social',E:'Entreprenant',C:'Conventionnel'};
  const colors = {R:'#E05A54',I:'#4F7AE8',A:'#8B5CF6',S:'#34C97A',E:'#D4A853',C:'#F59E0B'};

  const pcts = {};
  cats.forEach(c => { pcts[c] = Math.round(scores[c] / maxPossible * 100); });

  // Top 3 profile code
  const sorted = cats.sort((a,b) => pcts[b]-pcts[a]);
  const profileCode = sorted.slice(0,3).join('');

  document.getElementById('sp-code').textContent = profileCode;
  document.getElementById('sp-sub').textContent =
    `Dominant : ${names[sorted[0]]} (${pcts[sorted[0]]}%) · ${names[sorted[1]]} (${pcts[sorted[1]]}%) · ${names[sorted[2]]} (${pcts[sorted[2]]}%)`;

  // Grid
  document.getElementById('sp-grid').innerHTML = cats.map(c => `
    <div class="sp-card">
      <div class="sp-card-val" style="color:${colors[c]}">${pcts[c]}%</div>
      <div class="sp-card-lbl">${names[c]}</div>
    </div>`).join('');

  // Profile badges
  document.getElementById('sp-profile').innerHTML = sorted.slice(0,3).map((c,i) => `
    <div class="sp-badge" style="background:${colors[c]}18;border:1px solid ${colors[c]}40;color:${colors[c]}">
      ${c} — ${names[c]}
    </div>`).join('');

  // Merge with existing profile and store
  const existingProfile = JSON.parse(sessionStorage.getItem('ae_profile') || '{}');
  const enriched = {
    ...existingProfile,
    riasec_scores: pcts,
    riasec_profile: profileCode,
    riasec_dominant: sorted[0],
    riasec_date: new Date().toISOString(),
    test_complete: true,
    answered: answers.filter(a=>a!==null).length,
    skipped: answers.filter(a=>a===null).length
  };
  sessionStorage.setItem('ae_profile', JSON.stringify(enriched));
  sessionStorage.setItem('riasec_scores', JSON.stringify(pcts));
  sessionStorage.setItem('riasec_profile', profileCode);
}


/* PERSONALIZE FROM PROFILE */
(function(){
  try {
    const p = JSON.parse(sessionStorage.getItem('ae_profile') || '{}');
    if (p.metier) {
      const el = document.getElementById('tb-metier');
      if (el) el.textContent = '🎯 ' + p.metier;
    }
    if (p.prenom) {
      const panel = document.getElementById('score-panel');
      const nameEl = document.getElementById('sp-name');
      if (nameEl) {
        // Will be shown when results appear
        nameEl.textContent = 'Félicitations ' + p.prenom + ' !';
      }
    }
  } catch(e) {}
})();

/* INIT */
buildSidebar();
renderQ();
</script>
