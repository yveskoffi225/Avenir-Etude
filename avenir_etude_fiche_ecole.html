<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avenir Étude — Fiche École</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Instrument+Serif:ital@0;1&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }
    :root {
      --ink:      #060B14; --ink-2:    #0C1220; --ink-3:    #111827; --ink-4:    #1C2535;
      --gold:     #D4A853; --gold-dim: #7A5E2A; --gold-10:  rgba(212,168,83,.10);
      --ivory:    #F2EDE4; --ivory-dim:#8A8278; --ivory-faint:#2E3545;
      --wire:     rgba(242,237,228,.07); --wire-mid: rgba(242,237,228,.13); --wire-hi: rgba(242,237,228,.24);
      --green:    #34C97A; --green-10: rgba(52,201,122,.1);
      --blue:     #4F7AE8; --blue-10:  rgba(79,122,232,.1);
      --red:      #E05A54; --red-10:   rgba(224,90,84,.1);
      --max-w:    1280px;  --nav-h:    64px;
    }
    body { font-family:'Instrument Sans',sans-serif; background:var(--ink); color:var(--ivory); -webkit-font-smoothing:antialiased; cursor:none; overflow-x:hidden; }
    .cursor { position:fixed;width:8px;height:8px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;transition:width .18s,height .18s; }
    .cursor.big { width:28px;height:28px;background:transparent;border:1.5px solid var(--gold); }
    .cursor-ring { position:fixed;width:24px;height:24px;border:0.5px solid rgba(212,168,83,.25);border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:transform .14s ease; }
    body::after { content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:8000;opacity:.5; }

    /* ── NAV ── */
    nav { position:sticky;top:0;z-index:500;height:var(--nav-h);border-bottom:1px solid var(--wire);background:rgba(6,11,20,.9);backdrop-filter:blur(16px);display:flex;align-items:center; }
    .nav-inner { max-width:var(--max-w);margin:0 auto;padding:0 40px;width:100%;display:flex;align-items:center;gap:12px; }
    .nav-logo { font-family:'Bricolage Grotesque',sans-serif;font-size:16px;font-weight:700;color:var(--ivory);letter-spacing:-.03em;text-decoration:none; }
    .nav-sep { color:var(--ivory-faint); }
    .nav-crumb { font-size:13px;color:var(--ivory-dim);text-decoration:none;transition:color .15s; }
    .nav-crumb:hover { color:var(--ivory); }
    .nav-right { margin-left:auto;display:flex;align-items:center;gap:10px; }
    .nav-btn { font-size:12px;font-weight:600;padding:8px 16px;background:transparent;color:var(--ivory-dim);border:1px solid var(--wire-mid);border-radius:6px;cursor:none;text-decoration:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px; }
    .nav-btn:hover { border-color:var(--wire-hi);color:var(--ivory); }
    .nav-btn-gold { background:var(--gold);color:var(--ink);border-color:var(--gold); }
    .nav-btn-gold:hover { background:#e0b55e;color:var(--ink); }

    /* ── WRAP ── */
    .wrap { max-width:var(--max-w);margin:0 auto;padding:0 40px;position:relative;z-index:1; }

    /* ── HERO BANNER ── */
    .school-hero {
      padding: 52px 0 44px;
      border-bottom: 1px solid var(--wire);
      position: relative;
      overflow: hidden;
    }
    .school-hero::before {
      content: '';
      position: absolute;
      top: -80px; right: -80px;
      width: 400px; height: 400px;
      background: rgba(212,168,83,.06);
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
    }
    .hero-grid { display:grid; grid-template-columns:1fr auto; gap:40px; align-items:start; position:relative; z-index:1; }
    .hero-left { }
    .hero-breadcrumb { display:flex;align-items:center;gap:8px;font-size:11px;color:var(--ivory-dim);margin-bottom:20px; }
    .hero-breadcrumb a { color:var(--ivory-dim);text-decoration:none;transition:color .15s; }
    .hero-breadcrumb a:hover { color:var(--gold); }
    .hero-breadcrumb span { color:var(--ivory-faint); }
    .hero-type-badge {
      display:inline-flex;align-items:center;gap:6px;
      font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
      padding:4px 12px;border-radius:4px;margin-bottom:14px;
    }
    .badge-public { background:var(--green-10);color:var(--green);border:1px solid rgba(52,201,122,.2); }
    .badge-prive  { background:var(--blue-10);color:var(--blue);border:1px solid rgba(79,122,232,.2); }
    .hero-name {
      font-family:'Bricolage Grotesque',sans-serif;
      font-size:clamp(28px,4vw,52px);font-weight:800;letter-spacing:-.04em;line-height:1.05;
      color:var(--ivory);margin-bottom:6px;
    }
    .hero-acronyme {
      font-family:'Instrument Serif',serif;font-style:italic;
      font-size:clamp(18px,2vw,26px);color:var(--gold);font-weight:400;
      margin-bottom:14px;
    }
    .hero-meta { display:flex;flex-wrap:wrap;gap:16px;font-size:13px;color:var(--ivory-dim);margin-bottom:20px; }
    .hero-meta-item { display:flex;align-items:center;gap:6px; }
    .hero-desc { font-size:14px;line-height:1.72;color:var(--ivory-dim);max-width:600px;margin-bottom:24px; }
    .hero-actions { display:flex;gap:10px;flex-wrap:wrap; }
    .btn-gold { display:inline-flex;align-items:center;gap:8px;font-family:'Bricolage Grotesque',sans-serif;font-size:13px;font-weight:700;padding:12px 24px;background:var(--gold);color:var(--ink);border:none;border-radius:8px;cursor:none;text-decoration:none;transition:all .15s; }
    .btn-gold:hover { background:#e0b55e;transform:translateY(-1px); }
    .btn-ghost { display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;padding:11px 20px;background:transparent;color:var(--ivory-dim);border:1px solid var(--wire-mid);border-radius:8px;cursor:none;transition:all .15s; }
    .btn-ghost:hover { border-color:var(--wire-hi);color:var(--ivory); }

    /* Score card right */
    .hero-right { min-width:220px; }
    .score-card {
      background:var(--ink-3);border:1px solid var(--wire-mid);border-radius:16px;padding:24px;
      text-align:center;position:relative;overflow:hidden;
    }
    .score-card::before {
      content:'';position:absolute;top:-30px;left:-30px;
      width:120px;height:120px;background:rgba(212,168,83,.1);
      border-radius:50%;filter:blur(30px);pointer-events:none;
    }
    .score-label { font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ivory-dim);margin-bottom:10px; }
    .score-big {
      font-family:'Bricolage Grotesque',sans-serif;
      font-size:64px;font-weight:800;color:var(--gold);letter-spacing:-.06em;line-height:1;
    }
    .score-max { font-size:18px;color:var(--gold-dim);vertical-align:super; }
    .score-stars { font-size:16px;color:var(--gold);letter-spacing:2px;margin:8px 0; }
    .score-rank { font-size:12px;color:var(--ivory-dim);margin-top:6px; }
    .score-rank span { font-family:'Bricolage Grotesque',sans-serif;font-weight:700;color:var(--ivory); }
    .score-divider { height:1px;background:var(--wire);margin:16px 0; }
    .score-stat { display:flex;justify-content:space-between;font-size:12px;padding:4px 0; }
    .ss-label { color:var(--ivory-dim); }
    .ss-val { font-weight:600;color:var(--ivory); }
    .ss-val.green { color:var(--green); }
    .ss-val.gold { color:var(--gold); }

    /* ── COMPAT BANNER ── */
    .compat-banner {
      display:none;
      background:linear-gradient(90deg, rgba(212,168,83,.12), rgba(212,168,83,.04));
      border:1px solid var(--gold-dim);border-radius:10px;
      padding:14px 20px;margin:24px 0 0;
      align-items:center;gap:14px;
    }
    .compat-banner.show { display:flex; }
    .compat-icon { font-size:22px; flex-shrink:0; }
    .compat-text { flex:1;font-size:13px;color:var(--ivory-dim);line-height:1.5; }
    .compat-text strong { color:var(--gold); }
    .compat-pct {
      font-family:'Bricolage Grotesque',sans-serif;
      font-size:28px;font-weight:800;color:var(--gold);letter-spacing:-.03em;flex-shrink:0;
    }

    /* ── SECTION LAYOUT ── */
    .page-body { display:grid;grid-template-columns:1fr 320px;gap:32px;padding:40px 0; }
    .main-col { display:flex;flex-direction:column;gap:32px; }
    .side-col { display:flex;flex-direction:column;gap:16px; }

    /* Section block */
    .sec-block { background:var(--ink-2);border:1px solid var(--wire);border-radius:16px;overflow:hidden; }
    .sec-header {
      padding:20px 24px 16px;border-bottom:1px solid var(--wire);
      display:flex;align-items:center;justify-content:space-between;
    }
    .sec-title {
      font-family:'Bricolage Grotesque',sans-serif;font-size:17px;font-weight:700;
      color:var(--ivory);letter-spacing:-.02em;display:flex;align-items:center;gap:10px;
    }
    .sec-num { font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--gold); }
    .sec-body { padding:24px; }

    /* KPIs row */
    .kpi-row { display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--wire); }
    .kpi-box { background:var(--ink-2);padding:20px;text-align:center; }
    .kpi-val { font-family:'Bricolage Grotesque',sans-serif;font-size:28px;font-weight:800;letter-spacing:-.03em;line-height:1; }
    .kpi-lbl { font-size:11px;color:var(--ivory-dim);margin-top:5px;line-height:1.4; }
    .kv-gold { color:var(--gold); }
    .kv-green { color:var(--green); }
    .kv-blue { color:var(--blue); }

    /* Gauge bars */
    .gauge-list { display:flex;flex-direction:column;gap:14px; }
    .gauge-row { }
    .gauge-meta { display:flex;justify-content:space-between;margin-bottom:5px; }
    .gauge-label { font-size:12px;color:var(--ivory-dim); }
    .gauge-val { font-family:'Bricolage Grotesque',sans-serif;font-size:13px;font-weight:700;color:var(--ivory); }
    .gauge-track { height:5px;background:var(--wire);border-radius:3px;overflow:hidden; }
    .gauge-fill { height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(.4,0,.2,1); }

    /* Filières table */
    .filieres-list { display:flex;flex-direction:column;gap:0; }
    .filiere-row {
      display:grid;grid-template-columns:1fr auto auto auto;
      gap:16px;align-items:center;
      padding:14px 0;border-bottom:1px solid var(--wire);
      cursor:none;transition:padding-left .2s;
    }
    .filiere-row:last-child { border-bottom:none; }
    .filiere-row:hover { padding-left:6px; }
    .fil-name { font-size:13px;font-weight:600;color:var(--ivory); }
    .fil-niveau {
      font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;
      background:var(--ink-4);border:1px solid var(--wire);color:var(--ivory-dim);
      white-space:nowrap;
    }
    .fil-serie { font-size:11px;color:var(--ivory-faint);white-space:nowrap; }
    .fil-arrow { color:var(--ivory-faint);font-size:12px;transition:color .15s; }
    .filiere-row:hover .fil-arrow { color:var(--gold); }

    /* Admission steps */
    .admission-steps { display:flex;flex-direction:column;gap:0; }
    .adm-step { display:flex;gap:16px;padding:14px 0;border-bottom:1px solid var(--wire); }
    .adm-step:last-child { border-bottom:none; }
    .adm-num {
      width:28px;height:28px;border-radius:50%;
      background:var(--gold-10);border:1px solid var(--gold-dim);
      display:flex;align-items:center;justify-content:center;
      font-family:'Bricolage Grotesque',sans-serif;font-size:12px;font-weight:700;color:var(--gold);
      flex-shrink:0;margin-top:1px;
    }
    .adm-body { flex:1; }
    .adm-title { font-size:13px;font-weight:600;color:var(--ivory);margin-bottom:3px; }
    .adm-desc { font-size:12px;color:var(--ivory-dim);line-height:1.55; }

    /* Side cards */
    .side-card { background:var(--ink-3);border:1px solid var(--wire);border-radius:12px;padding:18px; }
    .side-card-title { font-family:'Bricolage Grotesque',sans-serif;font-size:14px;font-weight:700;color:var(--ivory);letter-spacing:-.01em;margin-bottom:12px;display:flex;align-items:center;gap:8px; }
    .info-list { display:flex;flex-direction:column;gap:8px; }
    .info-row { display:flex;justify-content:space-between;align-items:start;gap:8px;font-size:12px;padding:6px 0;border-bottom:1px solid var(--wire); }
    .info-row:last-child { border-bottom:none; }
    .info-label { color:var(--ivory-dim);flex-shrink:0; }
    .info-val { color:var(--ivory);font-weight:500;text-align:right; }
    .info-val.green { color:var(--green); }
    .info-val.gold { color:var(--gold); }

    /* Tags cloud */
    .tags-cloud { display:flex;flex-wrap:wrap;gap:6px; }
    .tag-chip { font-size:11px;font-weight:600;padding:4px 10px;border-radius:4px;border:1px solid var(--wire);color:var(--ivory-dim); }
    .tag-chip.riasec { background:var(--gold-10);border-color:var(--gold-dim);color:var(--gold); }

    /* CTA card */
    .cta-card {
      background:var(--gold);border-radius:12px;padding:20px;text-align:center;
    }
    .cta-card-title { font-family:'Bricolage Grotesque',sans-serif;font-size:16px;font-weight:800;color:var(--ink);letter-spacing:-.02em;margin-bottom:6px; }
    .cta-card-sub { font-size:12px;color:rgba(10,22,40,.65);margin-bottom:14px;line-height:1.5; }
    .cta-card-btn { display:block;width:100%;font-family:'Bricolage Grotesque',sans-serif;font-size:13px;font-weight:700;padding:11px;background:var(--ink);color:var(--ivory);border:none;border-radius:8px;cursor:none;transition:all .15s;text-decoration:none; }
    .cta-card-btn:hover { background:#0C1220; }

    /* Related schools */
    .related-school {
      display:flex;align-items:center;gap:12px;padding:10px 0;
      border-bottom:1px solid var(--wire);cursor:none;transition:all .15s;
    }
    .related-school:last-child { border-bottom:none; }
    .related-school:hover { padding-left:4px; }
    .rs-logo { width:32px;height:32px;border-radius:6px;background:var(--ink-4);border:1px solid var(--wire);display:flex;align-items:center;justify-content:center;font-family:'Bricolage Grotesque',sans-serif;font-size:7px;font-weight:700;color:var(--ivory-dim);text-align:center;flex-shrink:0; }
    .rs-name { flex:1;font-size:12px;font-weight:600;color:var(--ivory);line-height:1.3; }
    .rs-note { font-family:'Bricolage Grotesque',sans-serif;font-size:13px;font-weight:700;color:var(--gold); }

    /* Not found */
    .not-found { text-align:center;padding:100px 40px; }
    .nf-icon { font-size:56px;opacity:.3;margin-bottom:20px; }
    .nf-title { font-family:'Bricolage Grotesque',sans-serif;font-size:28px;font-weight:800;color:var(--ivory);margin-bottom:10px; }
    .nf-sub { font-size:14px;color:var(--ivory-dim);margin-bottom:28px;line-height:1.6; }

    /* Footer */
    footer { border-top:1px solid var(--wire);padding:28px 0; }
    .footer-inner { max-width:var(--max-w);margin:0 auto;padding:0 40px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px; }
    .footer-copy { font-size:11px;color:var(--ivory-faint); }
    .footer-links { display:flex;gap:20px; }
    .footer-links a { font-size:11px;color:var(--ivory-faint);text-decoration:none;transition:color .15s; }
    .footer-links a:hover { color:var(--ivory-dim); }

    /* Animations */
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)} }
    .fade-up { opacity:0; }
    .fade-up.in { animation:fadeUp .5s ease forwards; }
    .hero-left { animation:fadeUp .6s ease .05s both; }
    .hero-right { animation:fadeUp .7s ease .15s both; }

    /* Responsive */
    @media(max-width:1024px){
      .page-body { grid-template-columns:1fr; }
      .side-col { flex-direction:row;flex-wrap:wrap; }
      .side-col > * { flex:1;min-width:240px; }
      .hero-grid { grid-template-columns:1fr; }
      .hero-right { display:none; }
    }
    @media(max-width:768px){
      .wrap,.nav-inner,.footer-inner { padding-left:20px;padding-right:20px; }
      .kpi-row { grid-template-columns:1fr 1fr; }
      .filiere-row { grid-template-columns:1fr auto; }
      .fil-serie,.fil-niveau { display:none; }
    }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:var(--ink); }
    ::-webkit-scrollbar-thumb { background:rgba(242,237,228,.13);border-radius:2px; }
  
  /* ═══════════════════════════════════════
     AVENIR ÉTUDE V3 — DESIGN SYSTEM
     Clarté Africaine · Fond Blanc · Moderne
  ═══════════════════════════════════════ */
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&family=Lora:ital,wght@0,400;0,600;1,400;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap');

  :root {
    /* Colours */
    --bg:        #FAFAF8 !important;
    --bg-2:      #F4F3EF !important;
    --bg-3:      #EEECEA !important;
    --white:     #FFFFFF !important;
    --ink:       #0D0D0D !important;
    --ink-2:     #2A2A2A !important;
    --ink-3:     #555555 !important;
    --ink-4:     #888888 !important;
    --ink-5:     #BBBBBB !important;
    --border:    #E5E3DF !important;
    --border-2:  #D4D2CE !important;
    --blue:      #1B4FFF !important;
    --blue-10:   rgba(27,79,255,.08) !important;
    --blue-20:   rgba(27,79,255,.15) !important;
    --blue-dk:   #1240CC !important;
    --orange:    #FF6B35 !important;
    --orange-10: rgba(255,107,53,.08) !important;
    --green:     #00C853 !important;
    --green-10:  rgba(0,200,83,.08) !important;
    --purple:    #7C3AED !important;
    --purple-10: rgba(124,58,237,.08) !important;
    --yellow:    #F59E0B !important;
    --gold:      #D4A853 !important;
    --gold-dim:  #A07830 !important;
    --gold-10:   rgba(212,168,83,.10) !important;
    /* Legacy dark vars kept for compatibility */
    --ink-old:   #060B14;
    --wire:      rgba(0,0,0,.08) !important;
    --wire-mid:  rgba(0,0,0,.12) !important;
    --wire-hi:   rgba(0,0,0,.20) !important;
    --ivory:     #0D0D0D !important;
    --ivory-dim: #555555 !important;
    --ivory-faint: #888888 !important;
    /* Layout */
    --radius:    16px;
    --radius-lg: 24px;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --shadow:    0 4px 16px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
    --shadow-lg: 0 12px 40px rgba(0,0,0,.12), 0 4px 12px rgba(0,0,0,.06);
  }

  /* BASE RESET FOR V3 LIGHT THEME */
  body {
    font-family: 'DM Sans', 'Instrument Sans', sans-serif !important;
    background: #FAFAF8 !important;
    color: #0D0D0D !important;
    cursor: auto !important;
  }
  /* Hide dark cursor */
  .cursor, .cursor-ring { display: none !important; }
  body::after { display: none !important; }
  .grid-bg { display: none !important; }

  /* NAV V3 */
  nav {
    background: rgba(250,250,248,.94) !important;
    backdrop-filter: blur(16px) !important;
    border-bottom: 1px solid #E5E3DF !important;
    box-shadow: 0 1px 3px rgba(0,0,0,.04) !important;
  }
  .nav-logo, .nav-logo a {
    font-family: 'Plus Jakarta Sans', sans-serif !important;
    color: #0D0D0D !important;
  }
  .nav-btn {
    background: transparent !important;
    color: #555555 !important;
    border-color: #D4D2CE !important;

  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="display:block;flex-shrink:0;">
    <rect width="${size}" height="${size}" rx="${rx}" fill="${l.bg}"/>
    <rect x="0" y="${size*0.73}" width="${size}" height="${size*0.07}" fill="${l.fg}" opacity="0.85"/>
    <text x="${size/2}" y="${size*0.47}" text-anchor="middle" dominant-baseline="central"
      font-family="'Bricolage Grotesque',sans-serif"
      font-size="${fs}" font-weight="800" fill="${l.fg}" letter-spacing="-0.3">${t}</text>
  </svg>`;
}
function shortLogo(acr){ const p=acr.replace(/[^A-Za-z0-9-]/g,'').split('-'); return p.length>=2?p[0]+'<br>'+p.slice(1).join(''):acr.slice(0,5); }
function gaugeFill(pct){ if(pct>=80) return 'var(--green)'; if(pct>=60) return 'var(--gold)'; return 'var(--red)'; }

/* ── RENDER PAGE ── */
function renderSchool(e){
  if(!e){
    document.getElementById('page-content').innerHTML = `<div class="wrap"><div class="not-found"><div class="nf-icon">🏫</div><div class="nf-title">École introuvable</div><div class="nf-sub">L'identifiant ne correspond à aucun établissement dans notre base.<br>Retournez à l'annuaire pour trouver votre école.</div><a href="avenir_etude_ecoles.html" class="btn-gold" style="display:inline-flex;align-items:center;gap:8px;">← Retour à l'annuaire</a></div></div>`;
    return;
  }

  document.title = `Avenir Étude — ${e.acronyme} · Fiche École`;
  document.getElementById('nav-school-name').textContent = e.acronyme;

  // Compat profile from URL
  const profil = getParam('profil');
  const compatPct = profil ? Math.floor(55 + Math.random()*40) : null;

  // Related schools (same type, different ID)
  const related = ECOLES.filter(x=>x.id!==e.id&&(x.domaines.some(d=>e.domaines.includes(d)))).slice(0,3);

  const noteStars = Math.round(e.note_ae);
  const badgeClass = e.statut==='public'?'badge-public':'badge-prive';
  const labelHtml = e.label?`<span style="font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 10px;border-radius:4px;background:rgba(212,168,83,.1);border:1px solid #7A5E2A;color:#D4A853;margin-left:10px;">${e.label}</span>`:'';

  const html = `
  <div class="wrap">

    <!-- HERO -->
    <div class="school-hero">
      <div class="hero-grid">
        <div class="hero-left">
          <div class="hero-breadcrumb">
            <a href="avenir_etude_ecoles.html">Écoles</a>
            <span>›</span>
            <span>${e.type}</span>
            <span>›</span>
            <span style="color:var(--ivory)">${e.acronyme}</span>
          </div>
          <div class="hero-type-badge ${badgeClass}">
            <span style="width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;"></span>
            ${e.type} · ${e.statut==='public'?'Public':'Privé'}
          </div>
          <h1 class="hero-name">${e.nom}</h1>
          <div class="hero-acronyme">${e.acronyme}${labelHtml}</div>
          <div class="hero-meta">
            <div class="hero-meta-item">📍 ${e.ville}${e.commune&&e.commune!==e.ville?' · '+e.commune:''}</div>
            <div class="hero-meta-item">🎓 ${e.effectif?e.effectif.toLocaleString('fr-FR')+' étudiants':'Effectif N/C'}</div>
            <div class="hero-meta-item">📋 Rang national : #${e.classement_national}</div>
            ${e.site_web?`<div class="hero-meta-item">🌐 <a href="https://${e.site_web}" target="_blank" style="color:var(--gold);text-decoration:none;">${e.site_web}</a></div>`:''}
          </div>
          <p class="hero-desc">${e.description}</p>
          <div class="hero-actions">
            ${e.site_web?`<a href="https://${e.site_web}" target="_blank" class="btn-gold">Visiter le site officiel →</a>`:'<span class="btn-ghost">Site web non disponible</span>'}
            <a href="avenir_etude_ecoles.html" class="btn-ghost">← Retour à l'annuaire</a>
          </div>

          ${compatPct?`
          <div class="compat-banner show">
            <div class="compat-icon">🎯</div>
            <div class="compat-text">Selon votre profil <strong>${profil}</strong>, cette école correspond à votre orientation. Les filières proposées sont alignées avec vos aptitudes dominantes.</div>
            <div class="compat-pct">${compatPct}%</div>
          </div>`:''}
        </div>

        <div class="hero-right">
          <div class="score-card">
            <div class="score-label">Note Avenir Étude</div>
            <div class="score-big">${e.note_ae.toFixed(1)}<span class="score-max">/5</span></div>
            <div class="score-stars">${'★'.repeat(noteStars)}${'☆'.repeat(5-noteStars)}</div>
            <div class="score-rank">Classé <span>#${e.classement_national}</span> au national</div>
            <div class="score-divider"></div>
            <div class="score-stat"><span class="ss-label">Taux d'insertion</span><span class="ss-val green">${e.taux_insertion??'—'}%</span></div>
            <div class="score-stat"><span class="ss-label">Taux de réussite</span><span class="ss-val">${e.taux_reussite??'—'}%</span></div>
            <div class="score-stat"><span class="ss-label">Scolarité annuelle</span><span class="ss-val gold">${fmtFrais(e.frais_scolarite)}</span></div>
            <div class="score-stat"><span class="ss-label">Inscription</span><span class="ss-val">${fmtFrais(e.frais_inscription)}</span></div>
            <div class="score-stat"><span class="ss-label">Bourse dispo</span><span class="ss-val">${e.bourse_dispo?'✓ Oui':'Non'}</span></div>
          </div>
        </div>
      </div>
    </div>

    <!-- KPIs -->
    <div class="kpi-row" style="border:1px solid var(--wire);border-top:none;">
      <div class="kpi-box"><div class="kpi-val kv-gold">${e.note_ae.toFixed(1)}/5</div><div class="kpi-lbl">Note AE globale</div></div>
      <div class="kpi-box"><div class="kpi-val kv-green">${e.taux_insertion??'—'}%</div><div class="kpi-lbl">Taux d'insertion pro</div></div>
      <div class="kpi-box"><div class="kpi-val kv-blue">${e.taux_reussite??'—'}%</div><div class="kpi-lbl">Taux de réussite</div></div>
    </div>

    <!-- BODY -->
    <div class="page-body">
      <div class="main-col">

        <!-- PERFORMANCE -->
        <div class="sec-block fade-up">
          <div class="sec-header">
            <div class="sec-title"><span class="sec-num">01</span> Performance & Évaluation</div>
          </div>
          <div class="sec-body">
            <div class="gauge-list">
              <div class="gauge-row">
                <div class="gauge-meta"><span class="gauge-label">Qualité académique</span><span class="gauge-val">${Math.round((e.note_ae/5)*100)}%</span></div>
                <div class="gauge-track"><div class="gauge-fill" data-w="${Math.round((e.note_ae/5)*100)}" style="width:0%;background:var(--gold);"></div></div>
              </div>
              <div class="gauge-row">
                <div class="gauge-meta"><span class="gauge-label">Insertion professionnelle</span><span class="gauge-val">${e.taux_insertion??0}%</span></div>
                <div class="gauge-track"><div class="gauge-fill" data-w="${e.taux_insertion??0}" style="width:0%;background:${gaugeFill(e.taux_insertion??0)};"></div></div>
              </div>
              <div class="gauge-row">
                <div class="gauge-meta"><span class="gauge-label">Taux de réussite des examens</span><span class="gauge-val">${e.taux_reussite??0}%</span></div>
                <div class="gauge-track"><div class="gauge-fill" data-w="${e.taux_reussite??0}" style="width:0%;background:${gaugeFill(e.taux_reussite??0)};"></div></div>
              </div>
              <div class="gauge-row">
                <div class="gauge-meta"><span class="gauge-label">Note globale AE (sur 100)</span><span class="gauge-val">${Math.round(e.note_ae*20)}/100</span></div>
                <div class="gauge-track"><div class="gauge-fill" data-w="${Math.round(e.note_ae*20)}" style="width:0%;background:var(--gold);"></div></div>
              </div>
            </div>
          </div>
        </div>

        <!-- FILIÈRES -->
        <div class="sec-block fade-up" style="animation-delay:.1s">
          <div class="sec-header">
            <div class="sec-title"><span class="sec-num">02</span> Filières & Programmes</div>
            <span style="font-size:11px;color:var(--ivory-dim);">${e.filieres.length} programme${e.filieres.length>1?'s':''}</span>
          </div>
          <div class="sec-body" style="padding:0 24px;">
            <div class="filieres-list">
              ${e.filieres.map(f=>`
                <div class="filiere-row">
                  <div><div class="fil-name">${f.nom}</div><div style="font-size:11px;color:var(--ivory-faint);margin-top:2px;">${f.duree}</div></div>
                  <span class="fil-niveau">${f.niveau}</span>
                  <span class="fil-serie">BAC ${f.serie}</span>
                  <span class="fil-arrow">›</span>
                </div>`).join('')}
            </div>
          </div>
        </div>

        <!-- ADMISSION -->
        <div class="sec-block fade-up" style="animation-delay:.2s">
          <div class="sec-header">
            <div class="sec-title"><span class="sec-num">03</span> Processus d'Admission</div>
            <span style="font-size:11px;color:var(--ivory-dim);">${e.admission}</span>
          </div>
          <div class="sec-body" style="padding:0 24px;">
            <div class="admission-steps">
              ${e.adm_steps.map((s,i)=>`
                <div class="adm-step">
                  <div class="adm-num">${i+1}</div>
                  <div class="adm-body">
                    <div class="adm-title">${s.t}</div>
                    <div class="adm-desc">${s.d}</div>
                  </div>
                </div>`).join('')}
            </div>
          </div>
        </div>

      </div>

      <!-- SIDEBAR -->
      <div class="side-col">

        <!-- INFOS PRATIQUES -->
        <div class="side-card fade-up">
          <div class="side-card-title">📋 Informations pratiques</div>
          <div class="info-list">
            <div class="info-row"><span class="info-label">Ville</span><span class="info-val">${e.ville}</span></div>
            <div class="info-row"><span class="info-label">Type</span><span class="info-val">${e.type}</span></div>
            <div class="info-row"><span class="info-label">Séries BAC</span><span class="info-val">${e.series_bac.join(', ')}</span></div>
            <div class="info-row"><span class="info-label">Frais inscription</span><span class="info-val gold">${fmtFrais(e.frais_inscription)}</span></div>
            <div class="info-row"><span class="info-label">Scolarité/an</span><span class="info-val gold">${fmtFrais(e.frais_scolarite)}</span></div>
            <div class="info-row"><span class="info-label">Effectif</span><span class="info-val">${e.effectif?e.effectif.toLocaleString('fr-FR')+' étudiants':'N/C'}</span></div>
            <div class="info-row"><span class="info-label">Bourse</span><span class="info-val ${e.bourse_dispo?'green':''}">${e.bourse_dispo?'✓ Disponible':'Non disponible'}</span></div>
            <div class="info-row"><span class="info-label">Anglais</span><span class="info-val">${e.enseignement_anglais?'✓ Oui':'Non'}</span></div>
          </div>
        </div>

        <!-- PROFIL RIASEC COMPATIBLE -->
        <div class="side-card fade-up" style="animation-delay:.05s">
          <div class="side-card-title">🎯 Profil compatible</div>
          <div class="tags-cloud">
            ${e.tags_riasec.map(r=>{
              const names={R:'Réaliste',I:'Investigatif',A:'Artistique',S:'Social',E:'Entreprenant',C:'Conventionnel'};
              return `<span class="tag-chip riasec">${r} — ${names[r]||r}</span>`;
            }).join('')}
          </div>
          <p style="font-size:11px;color:var(--ivory-faint);margin-top:12px;line-height:1.6;">Profils RIASEC pour lesquels cette école est particulièrement recommandée.</p>
          <a href="avenir_etude_test_riasec.html" style="display:block;margin-top:12px;font-size:12px;font-weight:600;color:var(--gold);text-decoration:none;">→ Découvrir mon profil</a>
        </div>

        <!-- DOMAINES -->
        <div class="side-card fade-up" style="animation-delay:.1s">
          <div class="side-card-title">📚 Domaines d'enseignement</div>
          <div class="tags-cloud">
            ${e.domaines.map(d=>`<span class="tag-chip">${d}</span>`).join('')}
          </div>
        </div>

        <!-- CTA -->
        <div class="cta-card fade-up" style="animation-delay:.15s">
          <div class="cta-card-title">Votre profil est-il compatible ?</div>
          <div class="cta-card-sub">Passez le test d'orientation et recevez un rapport avec les écoles adaptées à vos aptitudes réelles.</div>
          <a href="avenir_etude_test_riasec.html" class="cta-card-btn">Faire mon test gratuit →</a>
        </div>

        <!-- ÉCOLES SIMILAIRES -->
        ${related.length>0?`
        <div class="side-card fade-up" style="animation-delay:.2s">
          <div class="side-card-title">🏫 Écoles similaires</div>
          ${related.map(r=>`
            <div class="related-school" onclick="window.location='avenir_etude_fiche_ecole.html?id=${r.id}'">
              <div class="rs-logo" style="background:transparent;border:none;padding:0;width:32px;height:32px;">${makeLogo(r.id,32,6)}</div>
              <div class="rs-name">${r.acronyme}<div style="font-size:10px;color:var(--ivory-dim);font-weight:400;">${r.ville}</div></div>
              <div class="rs-note">★ ${r.note_ae.toFixed(1)}</div>
            </div>`).join('')}
        </div>`:''}

      </div>
    </div>
  </div>`;

  document.getElementById('page-content').innerHTML = html;

  // Scroll reveal
  const io = new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});
  },{threshold:.1});
  document.querySelectorAll('.fade-up').forEach(el=>io.observe(el));

  // Animate gauges
  setTimeout(()=>{
    document.querySelectorAll('.gauge-fill[data-w]').forEach(el=>{
      el.style.width = el.dataset.w + '%';
    });
  }, 600);

  addHover();
}

/* ── FAVORI ── */
let isFav = false;
function toggleFavori(){
  isFav = !isFav;
  document.getElementById('favori-btn').textContent = isFav ? '♥ Retiré des favoris' : '♡ Ajouter aux favoris';
}

/* ── INIT ── */
const schoolId = getParam('id') || 'CI-001';
const school = ECOLES.find(e=>e.id===schoolId) || ECOLES[0];
renderSchool(school);
</script>
</body>
</html>
