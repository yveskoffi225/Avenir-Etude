<head>

  <title id="page-title">Avenir Étude — Fiche École</title>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800;12..96,900&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#060B14;--ink-2:#0C1220;--ink-3:#111827;--ink-4:#1C2535;
  --gold:#D4A853;--gold-dim:#7A5E2A;--gold-10:rgba(212,168,83,.10);--gold-20:rgba(212,168,83,.20);
  --ivory:#F2EDE4;--ivory-dim:#8A8278;--ivory-faint:#2E3545;
  --wire:rgba(242,237,228,.07);--wire-mid:rgba(242,237,228,.13);--wire-hi:rgba(242,237,228,.24);
  --green:#34C97A;--green-10:rgba(52,201,122,.1);
  --blue:#4F7AE8;--blue-10:rgba(79,122,232,.1);
  --red:#E05A54;--orange:#F59E0B;--purple:#8B5CF6;
}
body{font-family:"Instrument Sans",sans-serif;background:var(--ink);color:var(--ivory);-webkit-font-smoothing:antialiased;cursor:none;}
.ae-cursor{position:fixed;width:10px;height:10px;background:var(--gold);border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);mix-blend-mode:screen;top:-100px;left:-100px;transition:width .18s,height .18s;}
.ae-cursor.hover{width:30px;height:30px;background:transparent;border:1.5px solid var(--gold);}

/* NAV */
nav{position:sticky;top:0;z-index:500;height:64px;border-bottom:1px solid var(--wire);background:rgba(6,11,20,.96);backdrop-filter:blur(20px);display:flex;align-items:center;padding:0 40px;gap:12px;}
.nav-logo{font-family:"Bricolage Grotesque",sans-serif;font-size:17px;font-weight:800;color:var(--ivory);text-decoration:none;letter-spacing:-.03em;margin-right:8px;}
.nav-logo em{font-style:italic;color:var(--gold);}
.nav-sep{color:var(--ivory-faint);font-size:16px;}
.nav-crumb{font-size:13px;color:var(--ivory-dim);text-decoration:none;transition:color .15s;}
.nav-crumb:hover{color:var(--ivory);}
.nav-crumb.active{color:var(--ivory);font-weight:600;}
.nav-cta{margin-left:auto;font-family:"Bricolage Grotesque",sans-serif;font-size:13px;font-weight:700;padding:8px 18px;background:var(--gold);color:var(--ink);border:none;border-radius:8px;cursor:none;transition:all .15s;text-decoration:none;}
.nav-cta:hover{background:#e0b55e;}

/* HERO */
.hero{position:relative;overflow:hidden;border-bottom:1px solid var(--wire);}
.hero-bg{position:absolute;inset:0;opacity:.06;background-size:cover;filter:blur(40px);}
.hero-inner{max-width:1200px;margin:0 auto;padding:48px 40px 40px;display:grid;grid-template-columns:1fr auto;gap:40px;align-items:start;position:relative;z-index:1;}
.hero-left{display:flex;gap:28px;align-items:flex-start;}
.school-logo-lg{width:96px;height:96px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-family:"Bricolage Grotesque",sans-serif;font-size:20px;font-weight:900;text-align:center;flex-shrink:0;border:2px solid rgba(255,255,255,.1);}
.hero-meta{flex:1;}
.school-type-badge{display:inline-flex;align-items:center;gap:6px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border-radius:20px;margin-bottom:12px;}
.badge-public{background:var(--green-10);border:1px solid rgba(52,201,122,.2);color:var(--green);}
.badge-privee{background:var(--blue-10);border:1px solid rgba(79,122,232,.2);color:var(--blue);}
.badge-centre{background:var(--gold-10);border:1px solid var(--gold-dim);color:var(--gold);}
.school-name-full{font-family:"Bricolage Grotesque",sans-serif;font-size:clamp(22px,3.5vw,38px);font-weight:900;color:var(--ivory);letter-spacing:-.04em;line-height:1.05;margin-bottom:10px;}
.hero-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.hero-tag{font-size:11px;font-weight:600;padding:4px 12px;border-radius:20px;background:var(--ink-3);border:1px solid var(--wire-mid);color:var(--ivory-dim);}
.hero-tag.hot{background:var(--gold-10);border-color:var(--gold-dim);color:var(--gold);}
.hero-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}
.btn-primary{font-family:"Bricolage Grotesque",sans-serif;font-size:14px;font-weight:700;padding:12px 22px;background:var(--gold);color:var(--ink);border:none;border-radius:10px;cursor:none;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:8px;}
.btn-primary:hover{background:#e0b55e;transform:translateY(-1px);}
.btn-secondary{font-size:13px;font-weight:600;padding:11px 20px;background:transparent;border:1.5px solid var(--wire-mid);border-radius:10px;color:var(--ivory-dim);cursor:none;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:8px;}
.btn-secondary:hover{border-color:var(--wire-hi);color:var(--ivory);}

/* NOTE RING */
.note-ring-wrap{text-align:center;}
.note-ring{position:relative;width:120px;height:120px;margin:0 auto 8px;}
.note-ring svg{transform:rotate(-90deg);}
.note-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.note-val{font-family:"Bricolage Grotesque",sans-serif;font-size:28px;font-weight:900;color:var(--gold);line-height:1;}
.note-max{font-size:12px;color:var(--ivory-faint);}
.note-label{font-size:11px;font-weight:700;color:var(--ivory-dim);letter-spacing:.06em;text-transform:uppercase;}
.rank-badge{display:inline-flex;align-items:center;gap:6px;font-family:"Bricolage Grotesque",sans-serif;font-size:13px;font-weight:800;padding:6px 14px;background:var(--gold-10);border:1px solid var(--gold-dim);border-radius:8px;color:var(--gold);margin-top:8px;}

/* KPIs */
.kpis-bar{background:var(--ink-2);border-bottom:1px solid var(--wire);}
.kpis-inner{max-width:1200px;margin:0 auto;padding:20px 40px;display:grid;grid-template-columns:repeat(5,1fr);gap:0;}
.kpi{padding:16px 20px;border-right:1px solid var(--wire);}
.kpi:last-child{border-right:none;}
.kpi-val{font-family:"Bricolage Grotesque",sans-serif;font-size:22px;font-weight:800;margin-bottom:3px;}
.kpi-lbl{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ivory-faint);}
.kpi-sub{font-size:11px;color:var(--ivory-dim);margin-top:2px;}

/* MAIN LAYOUT */
.page-body{max-width:1200px;margin:0 auto;padding:40px;display:grid;grid-template-columns:1fr 340px;gap:32px;}

/* SECTIONS */
.section{margin-bottom:36px;}
.section-title{font-family:"Bricolage Grotesque",sans-serif;font-size:18px;font-weight:800;color:var(--ivory);letter-spacing:-.02em;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.section-title::before{content:"";width:3px;height:18px;background:var(--gold);border-radius:2px;flex-shrink:0;}

/* DESCRIPTION */
.desc-text{font-size:15px;color:var(--ivory-dim);line-height:1.75;margin-bottom:20px;}
.strengths-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.strength-item{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--ink-2);border:1px solid var(--wire);border-radius:10px;font-size:13px;color:var(--ivory-dim);}
.strength-icon{font-size:18px;flex-shrink:0;}

/* FILIERES */
.filieres-grid{display:flex;flex-direction:column;gap:10px;}
.filiere-card{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:center;padding:16px 20px;background:var(--ink-2);border:1px solid var(--wire-mid);border-radius:12px;transition:border-color .15s;}
.filiere-card:hover{border-color:var(--wire-hi);}
.filiere-name{font-family:"Bricolage Grotesque",sans-serif;font-size:15px;font-weight:800;color:var(--ivory);margin-bottom:4px;letter-spacing:-.01em;}
.filiere-meta{display:flex;gap:8px;flex-wrap:wrap;}
.f-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;}
.f-niveau{background:var(--blue-10);border:1px solid rgba(79,122,232,.2);color:var(--blue);}
.f-bac{background:var(--ink-3);border:1px solid var(--wire);color:var(--ivory-dim);}
.filiere-right{text-align:right;flex-shrink:0;}
.filiere-places{font-family:"Bricolage Grotesque",sans-serif;font-size:18px;font-weight:800;color:var(--gold);}
.filiere-duree{font-size:11px;color:var(--ivory-dim);margin-top:2px;}

/* METIERS */
.metiers-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.metier-mini{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--ink-2);border:1px solid var(--wire-mid);border-radius:10px;transition:all .2s;cursor:none;text-decoration:none;}
.metier-mini:hover{border-color:var(--wire-hi);transform:translateY(-2px);}
.mm-icon{font-size:24px;flex-shrink:0;}
.mm-info{flex:1;min-width:0;}
.mm-nom{font-size:13px;font-weight:700;color:var(--ivory);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mm-sal{font-size:11px;color:var(--ivory-dim);}
.mm-hot{width:6px;height:6px;border-radius:50%;background:var(--orange);flex-shrink:0;}
.mm-hot.normal{background:transparent;}

/* ADMISSION */
.admission-card{background:var(--ink-2);border:1px solid var(--wire-mid);border-radius:14px;padding:24px;}
.adm-row{display:flex;align-items:flex-start;gap:14px;padding:12px 0;border-bottom:1px solid var(--wire);}
.adm-row:last-child{border-bottom:none;padding-bottom:0;}
.adm-icon{font-size:20px;flex-shrink:0;width:32px;text-align:center;}
.adm-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ivory-faint);margin-bottom:3px;}
.adm-value{font-size:14px;color:var(--ivory);line-height:1.55;}
.adm-link{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--gold);text-decoration:none;margin-top:6px;}
.adm-link:hover{text-decoration:underline;}

/* SIDEBAR */
.sidebar{display:flex;flex-direction:column;gap:20px;}
.side-card{background:var(--ink-2);border:1px solid var(--wire-mid);border-radius:14px;padding:20px;}
.sc-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
.sc-title::before{content:"";width:12px;height:1px;background:var(--gold-dim);}

/* COMPAT SCORE */
.compat-ring{position:relative;width:100px;height:100px;margin:0 auto 12px;}
.compat-ring svg{transform:rotate(-90deg);}
.compat-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;}
.compat-val{font-family:"Bricolage Grotesque",sans-serif;font-size:26px;font-weight:900;line-height:1;}
.compat-pct{font-size:12px;color:var(--ivory-faint);}
.compat-label{text-align:center;font-size:12px;color:var(--ivory-dim);margin-bottom:14px;}
.compat-detail{font-size:11px;color:var(--ivory-dim);line-height:1.7;}

/* PARTENARIATS */
.partner-list{display:flex;flex-direction:column;gap:8px;}
.partner-item{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--ivory-dim);padding:8px 12px;background:var(--ink-3);border-radius:8px;}
.partner-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0;}

/* ECOLES SIMILAIRES */
.similar-schools{display:flex;flex-direction:column;gap:8px;}
.similar-card{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--ink-3);border:1px solid var(--wire);border-radius:9px;text-decoration:none;transition:all .15s;cursor:none;}
.similar-card:hover{border-color:var(--wire-hi);background:var(--ink-2);}
.sc-logo-sm{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:"Bricolage Grotesque",sans-serif;font-size:9px;font-weight:900;text-align:center;flex-shrink:0;}
.sc-name{font-size:13px;font-weight:700;color:var(--ivory);}
.sc-rank{font-size:11px;color:var(--ivory-dim);}
.sc-note{font-family:"Bricolage Grotesque",sans-serif;font-size:14px;font-weight:800;color:var(--gold);margin-left:auto;flex-shrink:0;}

/* BOURSE */
.bourse-banner{padding:14px 18px;background:var(--green-10);border:1px solid rgba(52,201,122,.2);border-radius:10px;margin-bottom:14px;}
.bb-title{font-size:13px;font-weight:700;color:var(--green);margin-bottom:4px;}
.bb-desc{font-size:12px;color:var(--ivory-dim);}

/* NOT FOUND */
.not-found{min-height:60vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;text-align:center;padding:40px;}
.nf-icon{font-size:64px;}
.nf-title{font-family:"Bricolage Grotesque",sans-serif;font-size:28px;font-weight:800;color:var(--ivory);}
.nf-sub{font-size:15px;color:var(--ivory-dim);}

/* RESPONSIVE */
@media(max-width:1024px){.page-body{grid-template-columns:1fr;} .sidebar{order:-1;} .kpis-inner{grid-template-columns:repeat(3,1fr);} .metiers-grid{grid-template-columns:1fr;} .strengths-grid{grid-template-columns:1fr 1fr;}}
@media(max-width:768px){nav{padding:0 20px;} .hero-inner{padding:28px 20px;grid-template-columns:1fr;} .kpis-inner{grid-template-columns:1fr 1fr;padding:14px 20px;} .page-body{padding:20px;} .strengths-grid{grid-template-columns:1fr;} .hero-left{flex-direction:column;gap:16px;}}
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:var(--ink);} ::-webkit-scrollbar-thumb{background:var(--wire-mid);border-radius:2px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .5s ease both;}
  </style>
</head>

/* ══ CURSOR ══ */
const cur = document.getElementById("ae-cursor");
document.addEventListener("mousemove", e=>{ cur.style.left=e.clientX+"px"; cur.style.top=e.clientY+"px"; });
document.addEventListener("mouseleave",()=>cur.style.opacity="0");
document.addEventListener("mouseenter",()=>cur.style.opacity="1");
function addHover(){
  document.querySelectorAll("a,button,.metier-mini,.filiere-card,.similar-card,.strength-item,.adm-link").forEach(el=>{
    el.addEventListener("mouseenter",()=>cur.classList.add("hover"));
    el.addEventListener("mouseleave",()=>cur.classList.remove("hover"));
  });
}

function fSal(v){
  if(!v||v===0) return "—";
  if(v>=1000000) return (v/1000000).toFixed(1)+"M";
  return Math.round(v/1000)+"k";
}

function renderStars(note){
  const full = Math.floor(note);
  const half = note%1 >= 0.5;
  return "★".repeat(full) + (half?"½":"") + "☆".repeat(5-full-(half?1:0));
}

function getTypeClass(type){
  if(type.includes("Publique")||type.includes("Excellence")) return "badge-public";
  if(type.includes("Privée")||type.includes("Privé")) return "badge-privee";
  return "badge-centre";
}

function calcCompatibility(school){
  const profile = JSON.parse(localStorage.getItem("ae_profile_v2")||sessionStorage.getItem("ae_profile")||"{}");
  const riasecProfile = profile.riasec_profile || "";
  
  if(!riasecProfile || !school.riasec_fit) return null;
  
  // Check overlap between profile letters and school riasec_fit
  const profileLetters = riasecProfile.split("");
  const schoolFit = school.riasec_fit;
  const overlap = profileLetters.filter(l => schoolFit.includes(l)).length;
  const maxPossible = Math.max(profileLetters.length, schoolFit.length);
  
  // Base score
  let score = Math.round((overlap / maxPossible) * 100);
  
  // Adjust for academic level
  const moy = parseFloat(profile.moy_t1 || 0);
  const minMoy = school.moyenne_admission || 12;
  if(moy > 0){
    if(moy >= minMoy + 2) score = Math.min(98, score + 15);
    else if(moy >= minMoy) score = Math.min(95, score + 8);
    else if(moy >= minMoy - 2) score = Math.max(20, score - 10);
    else score = Math.max(10, score - 25);
  }
  
  // Adjust for serie BAC
  const serie = profile.serie || "";
  if(serie && school.bac_requis && school.bac_requis.includes(serie)) score = Math.min(98, score + 10);
  
  return Math.min(98, Math.max(10, score));
}

function renderPage(school){
  const careers = SCHOOL_CAREERS[school.id] || [];
  const compat = calcCompatibility(school);
  const typeClass = getTypeClass(school.type);
  const circumference = 226;
  const noteOffset = circumference * (1 - school.note/5);
  const compatOffset = compat ? circumference * (1 - compat/100) : 0;
  const compatColor = compat ? (compat>=70?"var(--green)":compat>=50?"var(--gold)":"var(--red)") : "var(--ivory-faint)";
  
  // Sort careers: hot first, then by sr salary
  const sortedCareers = [...careers].sort((a,b) => {
    if(a.hot && !b.hot) return -1;
    if(!a.hot && b.hot) return 1;
    return (b.sal_sr?.[2]||0) - (a.sal_sr?.[2]||0);
  });
  
  // Similar schools
  const similarSchools = (school.ecoles_similaires||[]).map(id => SCHOOLS[id]).filter(Boolean);
  
  const bac_requis_str = (school.bac_requis||[]).join(", ");
  
  document.getElementById("page-title").textContent = `Avenir Étude — ${school.full}`;
  document.getElementById("nav-school-name").textContent = school.nom;
  
  document.getElementById("page-content").innerHTML = `
    <!-- HERO -->
    <div class="hero fade-up">
      <div class="hero-inner">
        <div class="hero-left">
          <div class="school-logo-lg" style="background:${school.logo_bg};color:${school.logo_fg};">
            ${school.nom}
          </div>
          <div class="hero-meta">
            <span class="school-type-badge ${typeClass}">
              ${school.gratuit?"🎓 Gratuit":"💳 Payant"} · ${school.type}
            </span>
            <h1 class="school-name-full">${school.full}</h1>
            <div class="hero-tags">
              <span class="hero-tag">📍 ${school.ville}</span>
              <span class="hero-tag">👥 ${school.effectif?.toLocaleString("fr-FR")} étudiants</span>
              <span class="hero-tag">🎂 Fondée en ${school.annee_fondation}</span>
              ${school.lien_concours?`<span class="hero-tag hot">⚡ Concours ouvert</span>`:""}
            </div>
            ${school.domaines ? `<div style="display:flex;gap:6px;flex-wrap:wrap;">
              ${school.domaines.map(d=>`<span style="font-size:11px;padding:3px 10px;border-radius:4px;background:var(--ink-3);border:1px solid var(--wire);color:var(--ivory-dim);">${d}</span>`).join("")}
            </div>` : ""}
            <div class="hero-actions">
              ${school.lien_concours ? `<a href="${school.lien_concours}" target="_blank" class="btn-primary">📋 Candidater →</a>` : ""}
              ${school.site ? `<a href="https://${school.site}" target="_blank" class="btn-secondary">🌐 Site officiel</a>` : ""}
              <button class="btn-secondary" onclick="toggleFavori('${school.id}')">
                <span id="fav-icon-${school.id}">${isFavori(school.id)?"❤️":"🤍"}</span> Favori
              </button>
            </div>
          </div>
        </div>
        
        <!-- NOTE RING -->
        <div class="note-ring-wrap">
          <div class="note-ring">
            <svg width="120" height="120" viewBox="0 0 120 120">
              <circle cx="60" cy="60" r="48" fill="none" stroke="rgba(242,237,228,.07)" stroke-width="8"/>
              <circle cx="60" cy="60" r="48" fill="none" stroke="#D4A853" stroke-width="8"
                stroke-dasharray="${circumference}" stroke-dashoffset="${noteOffset.toFixed(1)}"
                stroke-linecap="round"/>
            </svg>
            <div class="note-num">
              <div class="note-val">${school.note}</div>
              <div class="note-max">/5.0</div>
            </div>
          </div>
          <div class="note-label">Note Avenir Étude</div>
          <div style="text-align:center;margin-top:8px;">
            <span class="rank-badge">🏆 #${school.classement} national</span>
          </div>
        </div>
      </div>
    </div>

    <!-- KPIs -->
    <div class="kpis-bar fade-up">
      <div class="kpis-inner">
        <div class="kpi">
          <div class="kpi-val" style="color:var(--green);">${school.insertion}%</div>
          <div class="kpi-lbl">Taux insertion</div>
          <div class="kpi-sub">Emploi dans les 6 mois</div>
        </div>
        <div class="kpi">
          <div class="kpi-val" style="color:${school.gratuit?"var(--green)":"var(--gold)"};">${school.gratuit?"Gratuit":"Payant"}</div>
          <div class="kpi-lbl">Scolarité</div>
          <div class="kpi-sub" style="font-size:10px;">${school.frais_scolarite||"Variable"}</div>
        </div>
        <div class="kpi">
          <div class="kpi-val" style="color:var(--gold);">${school.moyenne_admission||"—"}/20</div>
          <div class="kpi-lbl">Moyenne admis</div>
          <div class="kpi-sub">Seuil recommandé</div>
        </div>
        <div class="kpi">
          <div class="kpi-val" style="color:var(--blue);">${(school.filieres||[]).length}</div>
          <div class="kpi-lbl">Filières</div>
          <div class="kpi-sub">Programmes disponibles</div>
        </div>
        <div class="kpi">
          <div class="kpi-val" style="color:var(--purple);">${careers.length}</div>
          <div class="kpi-lbl">Métiers liés</div>
          <div class="kpi-sub">Dans notre base CI</div>
        </div>
      </div>
    </div>

    <!-- MAIN BODY -->
    <div class="page-body">
      <div class="main-col">
        
        <!-- DESCRIPTION -->
        <div class="section fade-up">
          <div class="section-title">Présentation</div>
          <p class="desc-text">${school.desc}</p>
          ${(school.points_forts||[]).length ? `
          <div class="strengths-grid">
            ${school.points_forts.map(p=>`
            <div class="strength-item">
              <span class="strength-icon">✦</span>
              ${p}
            </div>`).join("")}
          </div>` : ""}
        </div>

        <!-- FILIERES -->
        ${(school.filieres||[]).length ? `
        <div class="section fade-up">
          <div class="section-title">Filières disponibles</div>
          <div class="filieres-grid">
            ${school.filieres.map(f=>`
            <div class="filiere-card">
              <div>
                <div class="filiere-name">${f.nom}</div>
                <div class="filiere-meta">
                  <span class="f-badge f-niveau">${f.niveau}</span>
                  <span class="f-badge f-bac">BAC ${(f.bac||[]).join(", ")}</span>
                </div>
              </div>
              <div class="filiere-right">
                <div class="filiere-places">${f.places}</div>
                <div class="filiere-duree">places · ${f.duree}</div>
              </div>
            </div>`).join("")}
          </div>
        </div>` : ""}

        <!-- METIERS COMPATIBLES -->
        ${sortedCareers.length ? `
        <div class="section fade-up">
          <div class="section-title">Métiers accessibles (${sortedCareers.length})</div>
          <div style="font-size:12px;color:var(--ivory-dim);margin-bottom:14px;">
            Métiers de notre base CI associés aux formations de ${school.nom}. Salaires réels (Source : GSA 2024-2025).
          </div>
          <div class="metiers-grid">
            ${sortedCareers.slice(0,12).map(m=>`
            <a href="avenir_etude_fiche_metier.html?id=${m.id}" class="metier-mini">
              <span class="mm-icon">${m.icon}</span>
              <div class="mm-info">
                <div class="mm-nom">${m.nom}</div>
                <div class="mm-sal">${fSal(m.sal_j?.[0])} → ${fSal(m.sal_sr?.[2])} FCFA/mois</div>
              </div>
              <div class="mm-hot ${m.hot?"":"normal"}">${m.hot?"🔥":""}</div>
            </a>`).join("")}
          </div>
          ${sortedCareers.length > 12 ? `<div style="text-align:center;margin-top:14px;"><a href="avenir_etude_carrieres.html" class="btn-secondary">Voir les ${sortedCareers.length - 12} autres métiers →</a></div>` : ""}
        </div>` : ""}

        <!-- ADMISSION -->
        <div class="section fade-up">
          <div class="section-title">Conditions d'admission</div>
          <div class="admission-card">
            ${school.gratuit ? `<div class="bourse-banner">
              <div class="bb-title">🎓 Formation gratuite</div>
              <div class="bb-desc">Cette école est publique — les frais de scolarité sont pris en charge par l'État. Seuls les frais d'inscription sont demandés.</div>
            </div>` : ""}
            <div class="adm-row">
              <span class="adm-icon">📋</span>
              <div>
                <div class="adm-label">Séries BAC acceptées</div>
                <div class="adm-value">${bac_requis_str || "Toutes séries"}</div>
              </div>
            </div>
            <div class="adm-row">
              <span class="adm-icon">📊</span>
              <div>
                <div class="adm-label">Moyenne recommandée</div>
                <div class="adm-value">${school.moyenne_admission||"—"}/20 — seuil de sélection indicatif</div>
              </div>
            </div>
            ${school.concours ? `<div class="adm-row">
              <span class="adm-icon">✏️</span>
              <div>
                <div class="adm-label">Concours d'entrée</div>
                <div class="adm-value">${school.concours}</div>
                ${school.lien_concours ? `<a href="${school.lien_concours}" target="_blank" class="adm-link">Candidater en ligne →</a>` : ""}
              </div>
            </div>` : ""}
            ${school.email ? `<div class="adm-row">
              <span class="adm-icon">✉️</span>
              <div>
                <div class="adm-label">Contact admissions</div>
                <div class="adm-value"><a href="mailto:${school.email}" class="adm-link">${school.email}</a></div>
              </div>
            </div>` : ""}
            ${school.frais_scolarite ? `<div class="adm-row">
              <span class="adm-icon">💰</span>
              <div>
                <div class="adm-label">Frais de scolarité</div>
                <div class="adm-value">${school.frais_scolarite}</div>
              </div>
            </div>` : ""}
          </div>
        </div>

      </div>
      
      <!-- SIDEBAR -->
      <div class="sidebar">
      
        <!-- COMPAT SCORE -->
        ${compat !== null ? `
        <div class="side-card fade-up">
          <div class="sc-title">Compatibilité profil</div>
          <div class="compat-ring">
            <svg width="100" height="100" viewBox="0 0 100 100">
              <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(242,237,228,.07)" stroke-width="7"/>
              <circle cx="50" cy="50" r="40" fill="none" stroke="${compatColor}" stroke-width="7"
                stroke-dasharray="251" stroke-dashoffset="${(251*(1-compat/100)).toFixed(1)}"
                stroke-linecap="round"/>
            </svg>
            <div class="compat-num">
              <div class="compat-val" style="color:${compatColor};">${compat}</div>
              <div class="compat-pct">/100</div>
            </div>
          </div>
          <div class="compat-label">
            ${compat>=75?"✅ Excellente compatibilité":compat>=55?"✦ Bonne compatibilité":"⚠️ Compatibilité partielle"}
          </div>
          <div class="compat-detail">
            Calculé depuis ton profil RIASEC, ta moyenne et ta série BAC. Passe les tests pour affiner ce score.
          </div>
          <div style="margin-top:12px;">
            <a href="avenir_etude_tests.html" class="btn-primary" style="width:100%;justify-content:center;font-size:13px;">
              Affiner mon score →
            </a>
          </div>
        </div>` : `
        <div class="side-card fade-up">
          <div class="sc-title">Compatibilité profil</div>
          <div style="text-align:center;padding:16px 0;">
            <div style="font-size:40px;margin-bottom:10px;">🧩</div>
            <div style="font-size:13px;color:var(--ivory-dim);margin-bottom:14px;">Passe les tests d'orientation pour découvrir si cette école correspond à ton profil.</div>
            <a href="avenir_etude_tests.html" class="btn-primary" style="justify-content:center;">Passer les tests →</a>
          </div>
        </div>`}

        <!-- PARTENARIATS -->
        ${(school.partenariats||[]).length ? `
        <div class="side-card fade-up">
          <div class="sc-title">Partenariats</div>
          <div class="partner-list">
            ${school.partenariats.map(p=>`
            <div class="partner-item">
              <div class="partner-dot"></div>
              ${p}
            </div>`).join("")}
          </div>
        </div>` : ""}

        <!-- ÉCOLES SIMILAIRES -->
        ${similarSchools.length ? `
        <div class="side-card fade-up">
          <div class="sc-title">Écoles similaires</div>
          <div class="similar-schools">
            ${similarSchools.map(s=>`
            <a href="avenir_etude_fiche_ecole.html?id=${s.id}" class="similar-card">
              <div class="sc-logo-sm" style="background:${s.logo_bg};color:${s.logo_fg};">${s.nom}</div>
              <div>
                <div class="sc-name">${s.nom}</div>
                <div class="sc-rank">#${s.classement} · ${s.type.split(" ")[0]}</div>
              </div>
              <div class="sc-note">${s.note}★</div>
            </a>`).join("")}
          </div>
        </div>` : ""}

        <!-- INFOS RAPIDES -->
        <div class="side-card fade-up">
          <div class="sc-title">Infos rapides</div>
          <div style="display:flex;flex-direction:column;gap:10px;">
            <div style="display:flex;justify-content:space-between;font-size:13px;padding:8px 0;border-bottom:1px solid var(--wire);">
              <span style="color:var(--ivory-dim);">Fondée en</span>
              <span style="font-weight:700;color:var(--ivory);">${school.annee_fondation}</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:13px;padding:8px 0;border-bottom:1px solid var(--wire);">
              <span style="color:var(--ivory-dim);">Effectif</span>
              <span style="font-weight:700;color:var(--ivory);">${school.effectif?.toLocaleString("fr-FR")} étud.</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:13px;padding:8px 0;border-bottom:1px solid var(--wire);">
              <span style="color:var(--ivory-dim);">Ville</span>
              <span style="font-weight:700;color:var(--ivory);">${school.ville}</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:13px;padding:8px 0;">
              <span style="color:var(--ivory-dim);">Site web</span>
              <a href="https://${school.site}" target="_blank" style="color:var(--gold);font-size:12px;text-decoration:none;">${school.site}</a>
            </div>
          </div>
        </div>

      </div>
    </div>
  `;
  
  addHover();
}

/* ══ FAVORIS ══ */
function isFavori(id){
  const favs = JSON.parse(localStorage.getItem("ae_favoris_ecoles")||"[]");
  return favs.includes(id);
}
function toggleFavori(id){
  const favs = JSON.parse(localStorage.getItem("ae_favoris_ecoles")||"[]");
  const idx = favs.indexOf(id);
  if(idx > -1) favs.splice(idx,1);
  else favs.push(id);
  localStorage.setItem("ae_favoris_ecoles", JSON.stringify(favs));
  const icon = document.getElementById("fav-icon-"+id);
  if(icon) icon.textContent = isFavori(id) ? "❤️" : "🤍";
}

/* ══ INIT ══ */
(function init(){
  const params = new URLSearchParams(window.location.search);
  const id = params.get("id");
  
  if(!id || !SCHOOLS[id]){
    document.getElementById("page-content").innerHTML = `
      <div class="not-found">
        <div class="nf-icon">🏫</div>
        <div class="nf-title">École introuvable</div>
        <div class="nf-sub">L'identifiant "${id||"inconnu"}" ne correspond à aucune école dans notre base.</div>
        <a href="avenir_etude_ecoles.html" class="btn-primary" style="margin-top:20px;">← Retour aux écoles</a>
      </div>`;
    return;
  }
  
  renderPage(SCHOOLS[id]);
})();
</script>
</body>
</html>
